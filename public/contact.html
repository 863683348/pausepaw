<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="co_t">联系我们</title>
  <meta name="description" content="PausePaw 联系我们：邮箱与留言表单，欢迎问题、建议与隐私请求。" />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="%%SITE_URL%%/contact.html" />
  <link rel="alternate" hreflang="zh" href="%%SITE_URL%%/contact.html" />
  <link rel="alternate" hreflang="en" href="%%SITE_URL%%/contact.html?lang=en" />
  <link rel="alternate" hreflang="x-default" href="%%SITE_URL%%/contact.html" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="PausePaw 联系我们" />
  <meta property="og:url" content="%%SITE_URL%%/contact.html" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="mascot.svg" />
  <script>
    (function () { try { var t = localStorage.getItem("pp_theme") || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"); document.documentElement.setAttribute("data-theme", t); } catch (e) {} })();
    function openMail(e) {
      e.preventDefault();
      var n = document.getElementById("cname").value.trim();
      var m = document.getElementById("cmsg").value.trim();
      var body = "称呼: " + n + "\n\n" + m;
      window.location.href = "mailto:ahmedlzany423@gmail.com?subject=" + encodeURIComponent("PausePaw 联系") + "&body=" + encodeURIComponent(body);
      return false;
    }
  </script>
  %%ANALYTICS%%
</head>
<body>
  <div class="container">
    <header class="bar page-bar">
      <div class="logo"><span class="dot"></span><a href="/" data-i18n="brand">PausePaw</a></div>
      <nav class="nav">
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换亮/暗色" aria-label="切换主题">🌙</button>
        <div class="lang-switch">
          <button data-lang="zh" onclick="setLang('zh')">中文</button>
          <button data-lang="en" onclick="setLang('en')">EN</button>
        </div>
        <a class="btn small" href="app.html" data-i18n="cta_start">开始使用</a>
      </nav>
    </header>
    <main class="legal">
      <a class="back" href="/" data-i18n="pg_back">返回首页</a>
      <h1 data-i18n="co_t">联系我们</h1>
      <p data-i18n="co_intro"></p>
      <h2 data-i18n="co_email_h"></h2>
      <p><a class="mail" href="mailto:ahmedlzany423@gmail.com" data-i18n="co_email">ahmedlzany423@gmail.com</a></p>
      <h2 data-i18n="co_form_h"></h2>
      <form class="contact-form" onsubmit="return openMail(event)">
        <input id="cname" type="text" data-i18n-ph="co_name_ph" placeholder="你的称呼" required />
        <textarea id="cmsg" rows="5" data-i18n-ph="co_msg_ph" placeholder="想说点什么…" required></textarea>
        <button class="btn" type="submit" data-i18n="co_send">发送</button>
      </form>
      <p class="note" data-i18n="co_note"></p>
    </main>
  </div>
  <footer class="site-footer">
    <nav class="foot-links">
      <a href="privacy.html" data-i18n="f_privacy">隐私政策</a>
      <a href="terms.html" data-i18n="f_terms">服务条款</a>
      <a href="faq.html" data-i18n="f_faq">常见问题</a>
      <a href="blog.html" data-i18n="f_blog">博客</a>
      <a href="contact.html" data-i18n="f_contact">联系我们</a>
    </nav>
    <p class="copy" data-i18n="footer">PausePaw · 数字健康陪伴</p>
  </footer>
  <script src="i18n.js"></script>
  <script>window.applyI18n();</script>
</body>
</html>
